<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Swifly — Instant File Transfer</title>
    <meta name="description" content="Send files from your phone to your PC instantly over WiFi. No install, no cloud, no waiting.">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface2: #1a1a24;
            --border: rgba(255,255,255,0.08);
            --primary: #6366f1;
            --primary-glow: rgba(99,102,241,0.25);
            --primary-dim: rgba(99,102,241,0.12);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text: #f1f5f9;
            --muted: #64748b;
            --muted2: #94a3b8;
            --radius: 16px;
            --radius-sm: 10px;
        }

        html, body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ── Card ─────────────────────────────── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px 28px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        /* ── Logo ─────────────────────────────── */
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #818cf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .tagline {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 28px;
        }

        /* ── Mode picker ── */
        #mode-picker { display: none; }
        #mode-picker.visible { display: block; }

        .mode-label {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 14px;
        }

        .mode-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 0;
        }

        .mode-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 20px 12px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s, transform 0.1s;
            text-align: center;
        }

        .mode-btn:hover { border-color: var(--primary); background: var(--primary-dim); }
        .mode-btn:active { transform: scale(0.97); }

        .mode-btn .icon { font-size: 2rem; margin-bottom: 8px; }
        .mode-btn .mode-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
        .mode-btn .mode-desc { font-size: 0.72rem; color: var(--muted); line-height: 1.4; }

        /* ── Receiver ─────────────────────────── */
        #receiver-panel { display: none; }
        #receiver-panel.visible { display: block; }

        #qr-box {
            background: #fff;
            border-radius: var(--radius-sm);
            padding: 14px;
            display: inline-block;
            margin-bottom: 16px;
        }

        .code-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .code-text {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
        }

        .copy-btn {
            background: var(--primary-dim);
            border: 1px solid rgba(99,102,241,0.3);
            border-radius: 6px;
            color: var(--primary);
            font-size: 0.7rem;
            padding: 4px 8px;
            cursor: pointer;
            transition: background 0.15s;
            flex-shrink: 0;
        }
        .copy-btn:hover { background: rgba(99,102,241,0.22); }

        .hint {
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* ── Sender ───────────────────────────── */
        #sender-panel { display: none; }
        #sender-panel.visible { display: block; }

        .code-input-wrap {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .code-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-align: center;
            padding: 14px 8px;
            text-transform: uppercase;
            outline: none;
            transition: border-color 0.2s;
        }
        .code-input::placeholder { color: var(--muted); font-size: 0.9rem; letter-spacing: 0.05em; font-weight: 400; }
        .code-input:focus { border-color: var(--primary); }

        /* ── Status pill ──────────────────────── */
        .status {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 0.8rem;
            color: var(--muted2);
            margin-bottom: 20px;
        }

        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--muted);
            flex-shrink: 0;
        }

        .status.waiting .dot { background: var(--muted); animation: pulse 1.6s infinite; }
        .status.connecting .dot { background: var(--warning); animation: pulse 0.9s infinite; }
        .status.connected .dot { background: var(--success); }
        .status.transferring .dot { background: var(--primary); animation: pulse 0.7s infinite; }
        .status.done .dot { background: var(--success); }
        .status.error .dot { background: var(--danger); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.25; }
        }

        /* ── File card ────────────────────────── */
        .file-card {
            background: var(--primary-dim);
            border: 1px solid rgba(99,102,241,0.22);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            text-align: left;
            margin-bottom: 18px;
            display: none;
        }
        .file-card.visible { display: block; }
        .file-card .fname {
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }
        .file-card .fsize { font-size: 0.75rem; color: var(--muted); }

        /* ── Progress ─────────────────────────── */
        .progress-wrap {
            background: rgba(255,255,255,0.06);
            border-radius: 99px;
            height: 6px;
            overflow: hidden;
            margin-bottom: 8px;
            display: none;
        }
        .progress-wrap.visible { display: block; }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #818cf8);
            width: 0%;
            transition: width 0.12s linear;
            border-radius: 99px;
        }

        .progress-label {
            font-size: 0.72rem;
            color: var(--muted);
            display: none;
            margin-bottom: 18px;
            text-align: center;
        }
        .progress-label.visible { display: block; }

        /* ── Success ──────────────────────────── */
        .success-icon {
            font-size: 2.8rem;
            margin-bottom: 10px;
            display: none;
        }
        .success-icon.visible { display: block; }

        /* ── Buttons ──────────────────────────── */
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            margin-bottom: 10px;
        }
        .btn:last-child { margin-bottom: 0; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff;
            box-shadow: 0 4px 16px var(--primary-glow);
        }
        .btn-primary:hover:not(:disabled) { opacity: 0.88; }

        .btn-ghost {
            background: transparent;
            color: var(--muted2);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }

        /* ── Error ────────────────────────────── */
        .error-msg {
            color: var(--danger);
            font-size: 0.78rem;
            margin-top: 10px;
            display: none;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 8px;
            padding: 10px 12px;
            text-align: left;
            line-height: 1.5;
        }
        .error-msg.visible { display: block; }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 22px 0;
        }

        #file-input { display: none; }
    </style>
</head>
<body>

<div class="card" id="app">
    <div class="logo">Swifly</div>
    <div class="tagline">Instant WiFi File Transfer</div>

    <!-- ─── Mode Picker ─────────────────────────── -->
    <div id="mode-picker">
        <div class="mode-label">What do you want to do?</div>
        <div class="mode-grid">
            <div class="mode-btn" id="btn-receive">
                <div class="icon">💻</div>
                <div class="mode-title">Receive</div>
                <div class="mode-desc">Generate a code &amp; QR for your phone to scan</div>
            </div>
            <div class="mode-btn" id="btn-send">
                <div class="icon">📱</div>
                <div class="mode-title">Send</div>
                <div class="mode-desc">Enter the code shown on your PC to connect</div>
            </div>
        </div>
    </div>

    <!-- ─── Receiver Panel ──────────────────────── -->
    <div id="receiver-panel">
        <div id="qr-box"></div>
        <div class="code-row">
            <div class="code-text" id="code-display">——————</div>
            <button class="copy-btn" id="copy-btn">Copy</button>
        </div>
        <div class="hint" id="recv-hint">Scan QR on your phone, or go to swifly and enter the code above.</div>
        <div class="status waiting" id="recv-status">
            <span class="dot"></span>
            <span id="recv-status-text">Generating code…</span>
        </div>
        <div class="progress-wrap" id="recv-progress-wrap"><div class="progress-bar" id="recv-progress-bar"></div></div>
        <div class="progress-label" id="recv-progress-label"></div>
        <div class="success-icon" id="recv-success">✅</div>
        <div class="error-msg" id="recv-error"></div>
        <hr class="divider">
        <button class="btn btn-ghost" id="recv-back-btn">← Back</button>
    </div>

    <!-- ─── Sender Panel ────────────────────────── -->
    <div id="sender-panel">
        <div class="status connecting" id="send-status" style="margin-bottom:10px;">
            <span class="dot"></span>
            <span id="send-status-text">Enter the code from your PC</span>
        </div>

        <div class="code-input-wrap" id="code-input-wrap">
            <input
                class="code-input"
                id="code-input"
                type="text"
                maxlength="6"
                placeholder="Enter code"
                autocomplete="off"
                autocorrect="off"
                spellcheck="false"
            >
            <button class="btn btn-primary" id="connect-btn" style="width:auto;padding:14px 18px;margin-bottom:0;">Connect</button>
        </div>

        <div class="file-card" id="file-card">
            <div class="fname" id="fname"></div>
            <div class="fsize" id="fsize"></div>
        </div>
        <div class="progress-wrap" id="send-progress-wrap"><div class="progress-bar" id="send-progress-bar"></div></div>
        <div class="progress-label" id="send-progress-label"></div>
        <div class="success-icon" id="send-success">✅</div>

        <button class="btn btn-primary" id="main-btn" disabled style="display:none;">Waiting for connection…</button>
        <button class="btn btn-ghost" id="change-btn" style="display:none;">Send another file</button>
        <div class="error-msg" id="send-error"></div>
        <hr class="divider">
        <button class="btn btn-ghost" id="send-back-btn">← Back</button>
    </div>
</div>

<input type="file" id="file-input">

<script>
// ─── Utilities ───────────────────────────────────────────────────────────────

function formatBytes(b) {
    if (!+b) return '0 B';
    const k = 1024, sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(b) / Math.log(k));
    return `${(b / Math.pow(k, i)).toFixed(1)} ${sizes[i]}`;
}

function getParam(key) {
    return new URLSearchParams(window.location.search).get(key);
}

function randomCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no 0,O,1,I to avoid confusion
    let code = '';
    for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
    return code;
}

// ─── PeerJS shared config ─────────────────────────────────────────────────────

const PEER_CONFIG = {
    debug: 1, // Basic logging
    config: {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' }
        ]
    }
};

// Removed 'reliable: true' as it is deprecated and causes connection hangs
const CONN_CONFIG = {
    serialization: 'none'   // ← raw ArrayBuffer; critical for iOS Safari + Android Chrome
};

const CHUNK = 64 * 1024; // 64 KB

// ─── Elements ────────────────────────────────────────────────────────────────

const modePicker   = document.getElementById('mode-picker');
const receiverPanel= document.getElementById('receiver-panel');
const senderPanel  = document.getElementById('sender-panel');
const btnReceive   = document.getElementById('btn-receive');
const btnSend      = document.getElementById('btn-send');
const recvBackBtn  = document.getElementById('recv-back-btn');
const sendBackBtn  = document.getElementById('send-back-btn');

// ─── Mode detection ───────────────────────────────────────────────────────────

const urlPeerId = getParam('id');

if (urlPeerId) {
    // Phone scanned QR code — go straight to sender
    showSender(urlPeerId.toUpperCase());
} else {
    // No ID param — show mode picker
    modePicker.classList.add('visible');
}

btnReceive.addEventListener('click', () => {
    modePicker.classList.remove('visible');
    receiverPanel.classList.add('visible');
    runReceiver();
});

btnSend.addEventListener('click', () => {
    modePicker.classList.remove('visible');
    senderPanel.classList.add('visible');
    initSenderUI(null); // no auto-connect, wait for code entry
});

recvBackBtn.addEventListener('click', resetToHome);
sendBackBtn.addEventListener('click', resetToHome);

function resetToHome() {
    location.href = location.pathname; // clear any ?id param
}

// ═══════════════════════════════════════════════════════════════════════════════
// RECEIVER (PC)
// ═══════════════════════════════════════════════════════════════════════════════

function runReceiver() {
    const qrBox       = document.getElementById('qr-box');
    const codeDisplay = document.getElementById('code-display');
    const copyBtn     = document.getElementById('copy-btn');
    const recvHint    = document.getElementById('recv-hint');
    const statusEl    = document.getElementById('recv-status');
    const statusText  = document.getElementById('recv-status-text');
    const progressWrap= document.getElementById('recv-progress-wrap');
    const progressBar = document.getElementById('recv-progress-bar');
    const progressLabel=document.getElementById('recv-progress-label');
    const successIcon = document.getElementById('recv-success');
    const errorEl     = document.getElementById('recv-error');

    let peerCode = randomCode();
    let peer;

    function tryConnect(code) {
        statusText.textContent = 'Connecting to signaling server…';
        
        let openTimeout = setTimeout(() => {
            statusEl.className = 'status error';
            statusText.textContent = 'Server timeout';
            errorEl.textContent = 'Could not connect to the WebRTC signaling server. It might be blocked by your network or temporarily down. Please reload the page.';
            errorEl.classList.add('visible');
        }, 15000);

        try {
            peer = new Peer(code, PEER_CONFIG);
        } catch (e) {
            clearTimeout(openTimeout);
            statusEl.className = 'status error';
            statusText.textContent = 'Failed to initialize';
            errorEl.textContent = e.message;
            errorEl.classList.add('visible');
            return;
        }

        peer.on('open', (id) => {
            clearTimeout(openTimeout);
            peerCode = id.toUpperCase();
            codeDisplay.textContent = peerCode;

            const shareUrl = `${location.origin}${location.pathname}?id=${peerCode}`;

            // QR Code
            qrBox.innerHTML = '';
            try {
                new QRCode(qrBox, {
                    text: shareUrl,
                    width: 180, height: 180,
                    colorDark: '#111118', colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.M
                });
            } catch(e) {
                qrBox.innerHTML = `<p style="color:#111;padding:16px;font-size:0.7rem;">QR unavailable<br>Use the code</p>`;
            }

            statusEl.className = 'status waiting';
            statusText.textContent = 'Waiting for phone…';
            recvHint.textContent = 'Scan the QR on your phone, or open Swifly and enter the code above.';

            // Copy button
            copyBtn.addEventListener('click', () => {
                navigator.clipboard?.writeText(peerCode).then(() => {
                    copyBtn.textContent = 'Copied!';
                    setTimeout(() => copyBtn.textContent = 'Copy', 2000);
                }).catch(() => {});
            });
        });

        peer.on('error', (err) => {
            clearTimeout(openTimeout);
            if (err.type === 'unavailable-id') {
                // Code taken — retry with a new one
                peer.destroy();
                tryConnect(randomCode());
            } else {
                statusEl.className = 'status error';
                statusText.textContent = 'Connection error';
                errorEl.textContent = `Error: ${err.message}`;
                errorEl.classList.add('visible');
            }
        });

        peer.on('connection', handleIncomingConnection);
    }

    function handleIncomingConnection(conn) {
        statusEl.className = 'status connecting';
        statusText.textContent = 'Phone connecting…';
        qrBox.style.opacity = '0.3';
        recvHint.textContent = 'Phone connected — waiting for file…';

        let meta = null;
        let chunks = [];
        let received = 0;

        conn.on('open', () => {
            statusEl.className = 'status connected';
            statusText.textContent = 'Phone connected — pick a file on your phone';
        });

        conn.on('data', (data) => {
            // Metadata arrives as a JSON string (because serialization:'none' = raw)
            if (typeof data === 'string') {
                try {
                    meta = JSON.parse(data);
                    chunks = [];
                    received = 0;
                    statusEl.className = 'status transferring';
                    statusText.textContent = `Receiving ${meta.name}…`;
                    recvHint.textContent = `${meta.name} · ${formatBytes(meta.size)}`;
                    progressWrap.classList.add('visible');
                    progressLabel.classList.add('visible');
                } catch(e) {}
                return;
            }

            // Binary chunks
            if (data instanceof ArrayBuffer || data instanceof Blob) {
                const byteLength = data.byteLength || data.size || 0;
                chunks.push(data);
                received += byteLength;
                
                const pct = meta ? Math.min(100, Math.round((received / meta.size) * 100)) : 0;
                progressBar.style.width = pct + '%';
                progressLabel.textContent = `${formatBytes(received)} / ${formatBytes(meta?.size || 0)} · ${pct}%`;

                if (meta && received >= meta.size) {
                    const blob = new Blob(chunks);
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = meta.name;
                    a.click();
                    URL.revokeObjectURL(a.href);

                    statusEl.className = 'status done';
                    statusText.textContent = 'Transfer complete ✓';
                    recvHint.textContent = `${meta.name} saved to your Downloads folder.`;
                    successIcon.classList.add('visible');
                    progressWrap.classList.remove('visible');
                    progressLabel.classList.remove('visible');
                }
            }
        });

        conn.on('close', () => {
            if (!meta || received < meta.size) {
                statusEl.className = 'status error';
                statusText.textContent = 'Connection lost — phone disconnected';
            }
        });

        conn.on('error', (err) => {
            statusEl.className = 'status error';
            statusText.textContent = 'Transfer error';
            errorEl.textContent = err.message;
            errorEl.classList.add('visible');
        });
    }

    tryConnect(peerCode);
}

// ═══════════════════════════════════════════════════════════════════════════════
// SENDER (Phone)
// ═══════════════════════════════════════════════════════════════════════════════

function showSender(autoId) {
    modePicker.classList.remove('visible');
    senderPanel.classList.add('visible');
    initSenderUI(autoId);
}

function initSenderUI(autoConnectId) {
    const statusEl      = document.getElementById('send-status');
    const statusText    = document.getElementById('send-status-text');
    const codeInputWrap = document.getElementById('code-input-wrap');
    const codeInput     = document.getElementById('code-input');
    const connectBtn    = document.getElementById('connect-btn');
    const fileCard      = document.getElementById('file-card');
    const fnameEl       = document.getElementById('fname');
    const fsizeEl       = document.getElementById('fsize');
    const progressWrap  = document.getElementById('send-progress-wrap');
    const progressBar   = document.getElementById('send-progress-bar');
    const progressLabel = document.getElementById('send-progress-label');
    const successIcon   = document.getElementById('send-success');
    const mainBtn       = document.getElementById('main-btn');
    const changeBtn     = document.getElementById('change-btn');
    const fileInput     = document.getElementById('file-input');
    const errorEl       = document.getElementById('send-error');

    let conn = null;
    let selectedFile = null;
    let peer = null;
    let connTimeout = null;

    if (autoConnectId) {
        // Pre-fill code from QR scan
        codeInput.value = autoConnectId;
        connectToPeer(autoConnectId);
    } else {
        statusText.textContent = 'Enter the code shown on the PC';
        statusEl.className = 'status waiting';
    }

    connectBtn.addEventListener('click', () => {
        const code = codeInput.value.trim().toUpperCase();
        if (code.length < 3) {
            showError('Please enter a valid code.');
            return;
        }
        connectToPeer(code);
    });

    codeInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') connectBtn.click();
    });

    function connectToPeer(peerId) {
        errorEl.classList.remove('visible');
        codeInputWrap.style.opacity = '0.5';
        connectBtn.disabled = true;
        codeInput.disabled = true;

        statusEl.className = 'status connecting';
        statusText.textContent = 'Connecting to signaling server…';

        try {
            peer = new Peer(PEER_CONFIG);
        } catch (e) {
            statusEl.className = 'status error';
            statusText.textContent = 'Initialization failed';
            showError(e.message);
            resetInputs();
            return;
        }

        // Failsafe timeout for signaling server connection
        let serverTimeout = setTimeout(() => {
            statusEl.className = 'status error';
            statusText.textContent = 'Server timeout';
            showError('Could not connect to the WebRTC signaling server. Try again.');
            resetInputs();
        }, 15000);

        peer.on('open', () => {
            clearTimeout(serverTimeout);
            statusText.textContent = 'Connecting to PC…';
            
            // Failsafe timeout for actual P2P WebRTC connection
            connTimeout = setTimeout(() => {
                statusEl.className = 'status error';
                statusText.textContent = 'Connection timeout';
                showError('P2P Connection timed out. Your WiFi network might be blocking direct WebRTC connections. Try restarting your browser or switching to mobile data.');
                resetInputs();
            }, 20000);

            conn = peer.connect(peerId, CONN_CONFIG);

            conn.on('open', () => {
                clearTimeout(connTimeout);
                statusEl.className = 'status connected';
                statusText.textContent = 'PC connected — pick a file to send';
                codeInputWrap.style.display = 'none';
                mainBtn.style.display = 'block';
                mainBtn.textContent = 'Choose File';
                mainBtn.disabled = false;
                mainBtn.onclick = () => fileInput.click();
            });

            conn.on('error', (err) => {
                clearTimeout(connTimeout);
                statusEl.className = 'status error';
                statusText.textContent = 'Connection error';
                showError(`Connection error: ${err.message}`);
                resetInputs();
            });

            conn.on('close', () => {
                clearTimeout(connTimeout);
                if (!successIcon.classList.contains('visible')) {
                    statusEl.className = 'status error';
                    statusText.textContent = 'Disconnected from PC';
                    showError('The PC disconnected. Reload and try again.');
                    resetInputs();
                }
            });
        });

        peer.on('error', (err) => {
            clearTimeout(serverTimeout);
            clearTimeout(connTimeout);
            statusEl.className = 'status error';
            
            if (err.type === 'peer-unavailable') {
                statusText.textContent = 'PC not found';
                showError('No PC found with that code. Make sure Swifly is open on your PC and the code is correct.');
            } else {
                statusText.textContent = 'Connection failed';
                showError(`Error: ${err.message}`);
            }
            resetInputs();
        });
    }

    fileInput.addEventListener('change', (e) => {
        selectedFile = e.target.files[0];
        if (!selectedFile) return;

        fnameEl.textContent = selectedFile.name;
        fsizeEl.textContent = formatBytes(selectedFile.size);
        fileCard.classList.add('visible');
        mainBtn.textContent = 'Send File';
        mainBtn.onclick = sendFile;
        mainBtn.disabled = false;
        successIcon.classList.remove('visible');
        changeBtn.style.display = 'none';
        progressWrap.classList.remove('visible');
        progressLabel.classList.remove('visible');
        progressBar.style.width = '0%';
        errorEl.classList.remove('visible');
    });

    function sendFile() {
        if (!selectedFile || !conn) return;

        mainBtn.disabled = true;
        mainBtn.textContent = 'Sending…';
        statusEl.className = 'status transferring';
        statusText.textContent = 'Sending…';
        progressWrap.classList.add('visible');
        progressLabel.classList.add('visible');
        errorEl.classList.remove('visible');

        // Send metadata as JSON string (required with serialization:'none')
        const meta = JSON.stringify({ name: selectedFile.name, size: selectedFile.size });
        conn.send(meta);

        // Send file in chunks
        const reader = new FileReader();
        let offset = 0;

        function readChunk() {
            const slice = selectedFile.slice(offset, offset + CHUNK);
            reader.readAsArrayBuffer(slice);
        }

        reader.onload = (e) => {
            conn.send(e.target.result);
            offset += e.target.result.byteLength;

            const pct = Math.min(100, Math.round((offset / selectedFile.size) * 100));
            progressBar.style.width = pct + '%';
            progressLabel.textContent = `${formatBytes(offset)} / ${formatBytes(selectedFile.size)} · ${pct}%`;

            if (offset < selectedFile.size) {
                setTimeout(readChunk, 0);
            } else {
                statusEl.className = 'status done';
                statusText.textContent = 'Transfer complete ✓';
                successIcon.classList.add('visible');
                progressWrap.classList.remove('visible');
                progressLabel.classList.remove('visible');
                mainBtn.style.display = 'none';
                changeBtn.style.display = 'block';
            }
        };

        changeBtn.onclick = () => {
            fileInput.value = '';
            fileInput.click();
        };

        readChunk();
    }

    function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.add('visible');
    }

    function resetInputs() {
        codeInputWrap.style.opacity = '1';
        connectBtn.disabled = false;
        codeInput.disabled = false;
        if (peer) {
            try { peer.destroy(); } catch(e) {}
        }
    }
}
</script>
</body>
</html>
